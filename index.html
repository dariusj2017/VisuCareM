<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Viewport Test</title>

  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no,
                 viewport-fit=cover">

  <style>
    body {
      font-family: system-ui;
      background: #111;
      color: #0f0;
      padding: 20px;
      font-size: 22px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<h2>Viewport Test</h2>

<div id="out"></div>

<script>
function update() {
  const out = document.getElementById("out");
  out.innerHTML = `
    <b>window.innerWidth:</b> ${window.innerWidth}<br>
    <b>window.innerHeight:</b> ${window.innerHeight}<br><br>

    <b>screen.width:</b> ${window.screen.width}<br>
    <b>screen.height:</b> ${window.screen.height}<br><br>

    <b>documentElement.clientWidth:</b> ${document.documentElement.clientWidth}<br>
    <b>documentElement.clientHeight:</b> ${document.documentElement.clientHeight}<br>
  `;
}

update();
window.addEventListener("resize", update);
</script>

</body>
</html>
