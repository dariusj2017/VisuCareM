<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optikos Matavimas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="photoCanvas"></canvas>

    <!-- Gulsčiukas -->
    <div id="h-line"></div>

    <!-- Kryžiukai statmenumui -->
    <div id="cross-left" class="cross"></div>
    <div id="cross-right" class="cross"></div>

    <!-- Mygtukai -->
    <div class="controls">
        <button id="captureBtn">Fotografuoti</button>
        <button id="resetBtn">Iš naujo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
