<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8">
  <title>Regos Priežiūra – Matavimo Sistema</title>

  <!-- Tik iPad 11" 2025 + landscape-only -->
  <script>
    function isSupportedDevice() {
      const ua = navigator.userAgent;
      const isiPad = /iPad/.test(ua);

      const w = window.screen.width;
      const h = window.screen.height;

      const isExactSize =
        (w === 2360 && h === 1640) ||
        (w === 1640 && h === 2360);

      const isLandscape = window.innerWidth > window.innerHeight;

      return isiPad && isExactSize && isLandscape;
    }

    if (!isSupportedDevice()) {
      document.write(`
        <style>
          body {
            background: #000;
            color: #fff;
            font-family: system-ui;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
          }
        </style>
        <h1>Ši sistema skirta tik iPad 11" (2025) landscape režimu</h1>
        <p>Prašome naudoti tinkamą įrenginį.</p>
      `);
    }
  </script>

  <!-- Išjungiam Safari zoom -->
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 user-scalable=no">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <img src="img/regos-prieziuros-logotipas.png" class="logo">
    <div class="title">Regos Priežiūra – Matavimo Sistema</div>

    <button id="menu-btn" class="menu-btn">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </button>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar" class="sidebar">
    <div class="sidebar-content">
      <button id="close-sidebar" class="close-sidebar">✕</button>

      <h3>Meniu</h3>

      <button class="sidebar-item" id="menu-settings">⚙️ Nustatymai</button>
      <button class="sidebar-item" id="menu-calibration">📐 Kalibravimas</button>
      <button class="sidebar-item" id="menu-about">ℹ️ Apie sistemą</button>
      <button class="sidebar-item" id="menu-help">❓ Pagalba</button>
      <button class="sidebar-item" id="menu-version">🧩 Versija</button>
    </div>
  </div>

  <!-- FRONT SCREEN -->
  <div id="front-screen" class="screen active">
    <div class="left-panel">
      <h2>FRONT</h2>

      <div class="image-wrapper">
        <video id="video-front" class="fullscreen-media" autoplay playsinline></video>
        <div id="horizon-front" class="horizon-line"></div>
        <canvas id="canvas-front" class="fullscreen-media"></canvas>

        <button id="front-shutter-left" class="shutter-btn left"></button>
        <button id="front-shutter-right" class="shutter-btn right"></button>
      </div>

      <button id="front-freeze" style="display:none;">Freeze</button>
    </div>

    <div class="right-panel">
      <h3>Instrukcija</h3>
      <p>Pacientas žiūri tiesiai į kamerą.</p>
    </div>
  </div>

  <!-- SIDE SCREEN -->
  <div id="side-screen" class="screen">
    <div class="left-panel">
      <h2>SIDE</h2>

      <div class="image-wrapper">
        <video id="video-side" class="fullscreen-media" autoplay playsinline></video>
        <div id="horizon-side" class="horizon-line"></div>
        <canvas id="canvas-side" class="fullscreen-media"></canvas>

        <button id="side-shutter-left" class="shutter-btn left"></button>
        <button id="side-shutter-right" class="shutter-btn right"></button>
      </div>

      <button id="side-freeze" style="display:none;">Freeze</button>
      <button id="side-to-check">Toliau į CHECK</button>
    </div>

    <div class="right-panel">
      <h3>Instrukcija</h3>
      <p>Pacientas profiliu.</p>
    </div>
  </div>

  <!-- CHECK SCREEN -->
  <div id="check-screen" class="screen">
    <div class="left-panel">
      <h2>CHECK</h2>

      <div class="image-wrapper">
        <img id="check-front-img" class="base-image fullscreen-media">

        <div id="pupil-left" class="handle pupil"></div>
        <div id="pupil-right" class="handle pupil"></div>
        <div id="marker-top" class="handle marker"></div>
        <div id="frame-ref-line" class="ref-line"></div>
      </div>
    </div>

    <div class="right-panel">
      <h3>Matavimai</h3>
      <div>PD: <span id="pd-value">–</span></div>
      <div>HOC L: <span id="hoc-left-value">–</span></div>
      <div>HOC R: <span id="hoc-right-value">–</span></div>
      <div>Panto: <span id="panto-value">–</span></div>
      <div>Vertex: <span id="vertex-value">–</span></div>

      <button id="to-results">Į RESULTS</button>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen" class="screen">
    <div class="results-container">
      <div class="results-row">
        <div class="results-block">
          <h3>Front</h3>
          <img id="results-front-img" class="results-img fullscreen-media">
        </div>

        <div class="results-block">
          <h3>Side</h3>
          <img id="results-side-img" class="results-img fullscreen-media">
        </div>
      </div>

      <div class="results-row">
        <table class="results-table">
          <tr><td>PD</td><td id="res-pd">–</td></tr>
          <tr><td>HOC L</td><td id="res-hoc-l">–</td></tr>
          <tr><td>HOC R</td><td id="res-hoc-r">–</td></tr>
          <tr><td>Panto</td><td id="res-panto">–</td></tr>
          <tr><td>Vertex</td><td id="res-vertex">–</td></tr>
        </table>
      </div>

      <button id="back-to-check">Atgal</button>
      <button id="confirm-order">Patvirtinti</button>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings-panel" class="settings-panel">
    <div class="settings-content">
      <h3>Nustatymai</h3>

      <label>Pasukimas:</label>
      <select id="rotation-select">
        <option value="0">0°</option>
        <option value="90">90°</option>
        <option value="-90">-90°</option>
        <option value="180">180°</option>
      </select>

      <label>Flip:</label>
      <select id="flip-select">
        <option value="none">Nėra</option>
        <option value="horizontal">Horizontalus</option>
        <option value="vertical">Vertikalus</option>
        <option value="both">Abu</option>
      </select>

      <label>Gulščiuko slenkstis (°):</label>
      <input id="horizon-threshold" type="number" min="1" max="30" value="7">

      <button id="close-settings" class="close-btn">Uždaryti</button>
    </div>
  </div>

  <!-- INFO MODAL -->
  <div id="info-modal" class="info-modal">
    <div class="info-content">
      <h3 id="info-title"></h3>
      <p id="info-text"></p>
      <button id="info-close" class="close-btn">Uždaryti</button>
    </div>
  </div>

  <!-- Disable double-tap zoom -->
  <script>
    let lastTouch = 0;
    document.addEventListener("touchend", function (e) {
      const now = Date.now();
      if (now - lastTouch <= 300) e.preventDefault();
      lastTouch = now;
    }, { passive: false });

    document.addEventListener("gesturestart", function (e) {
      e.preventDefault();
    });
  </script>

  <!-- OpenCV + MediaPipe -->
  <script src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

  <!-- Main app -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
